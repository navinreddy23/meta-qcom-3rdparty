# yaml-language-server: $schema=https://raw.githubusercontent.com/siemens/kas/master/kas/schema-kas.json
header:
  version: 14
  
# The default password for root user is "oelinux123"
target: qcom-minimal-image

local_conf_header:
  radxa-disable-adb: |
    SYSTEMD_AUTO_ENABLE:pn-android-tools = "disable"

  image-packages: |
    IMAGE_INSTALL:append = " \
        btop \
        dropbear \
        openssh-sftp-server \
        systemd-networkd \
    "
    # qcom-minimal-image explicitly blocks systemd-networkd
    BAD_RECOMMENDATIONS:remove = "systemd-networkd"